name: Health Check

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  health-check:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Install OPA
        run: |
          curl -L -o /usr/local/bin/opa \
            https://openpolicyagent.org/downloads/v1.0.0/opa_linux_amd64_static
          chmod +x /usr/local/bin/opa
          opa version

      - name: Run policy-check.py
        run: python scripts/policy-check.py

      - name: Run link-checker.py
        run: python scripts/link-checker.py --report reports/link-checker.md

      - name: Run cross-index-check.py
        run: python scripts/cross-index-check.py

      - name: Generate machine stats (reports/stats.json)
        run: python scripts/knowledge-cli.py stats

      - name: Run check-stats-consistency.py
        run: python scripts/check-stats-consistency.py

      - name: Run sync-view-from-struct.py (strict)
        run: python scripts/sync-view-from-struct.py

      - name: Run template-padding-check.py
        run: python scripts/template-padding-check.py

      - name: Run health-check.py
        run: python scripts/health-check.py

      - name: Run build-deliverables.py
        run: python scripts/build-deliverables.py

      - name: Upload reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: reports
          path: reports/
          if-no-files-found: ignore

      - name: Upload deliverables
        uses: actions/upload-artifact@v4
        with:
          name: deliverables
          path: dist/
          if-no-files-found: ignore
