# SLSA Provenance + Sigstore Keyless Signing + SBOM 验证示例
# 对齐：SLSA v1.2 Build Track L3、Sigstore/Cosign、OCI v1.1 Reference Types
# 使用：复制到 .github/workflows/slsa-provenance.yml 并根据组织/仓库名修改

name: SLSA Provenance and SBOM Attestation

on:
  push:
    branches: [main]
    tags: ["v*"]
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

permissions:
  contents: read
  id-token: write  # 用于 Sigstore keyless 签名
  packages: write  # 用于推送镜像到 GHCR
  attestations: write  # 用于生成 GitHub provenance attestation

jobs:
  build:
    runs-on: ubuntu-latest
    outputs:
      image: ${{ steps.image.outputs.image }}
      digest: ${{ steps.build.outputs.digest }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=ref,event=branch
            type=semver,pattern={{version}}
            type=sha,prefix=,suffix=,format=short

      - name: Build and push image
        id: build
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          provenance: true
          sbom: true
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Output image reference
        id: image
        run: |
          echo "image=${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}" >> "$GITHUB_OUTPUT"

  # SLSA Build L3 provenance using the official generator
  provenance:
    needs: [build]
    permissions:
      id-token: write
      packages: write
      actions: read
    uses: slsa-framework/slsa-github-generator/.github/workflows/generator_container_slsa3.yml@v2.0.0
    with:
      image: ${{ needs.build.outputs.image }}
      digest: ${{ needs.build.outputs.digest }}
      registry-username: ${{ github.actor }}
    secrets:
      registry-password: ${{ secrets.GITHUB_TOKEN }}

  # Sigstore keyless signing with Cosign
  sign:
    needs: [build]
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      packages: write
    steps:
      - name: Install Cosign
        uses: sigstore/cosign-installer@v3.6.0

      - name: Sign image with Cosign (keyless)
        run: |
          cosign sign --yes \
            "${{ needs.build.outputs.image }}@${{ needs.build.outputs.digest }}"

  # SBOM generation and vulnerability scanning
  sbom:
    needs: [build]
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: read
    steps:
      - name: Install Syft and Grype
        uses: anchore/sbom-action/download-syft@v0
      - run: curl -sSfL https://raw.githubusercontent.com/anchore/grype/main/install.sh | sh -s -- -b /usr/local/bin

      - name: Generate SPDX 3.0 SBOM
        run: |
          syft "${{ needs.build.outputs.image }}@${{ needs.build.outputs.digest }}" \
            -o spdx-json=sbom.spdx.json

      - name: Generate CycloneDX 1.7 SBOM
        run: |
          syft "${{ needs.build.outputs.image }}@${{ needs.build.outputs.digest }}" \
            -o cyclonedx-json=sbom.cyclonedx.json

      - name: Scan SBOM for vulnerabilities
        run: |
          grype sbom.spdx.json --fail-on high --output sarif=vuln-report.sarif

      - name: Upload SBOM artifacts
        uses: actions/upload-artifact@v4
        with:
          name: sbom-artifacts
          path: |
            sbom.spdx.json
            sbom.cyclonedx.json
            vuln-report.sarif

  # OCI v1.1 referrer verification (example)
  verify:
    needs: [build, provenance, sign]
    runs-on: ubuntu-latest
    permissions:
      packages: read
    steps:
      - name: Install regctl
        uses: regclient/actions/regctl-installer@main

      - name: Verify image signatures and referrers
        run: |
          echo "=== Image referrers (OCI v1.1) ==="
          regctl manifest get \
            "${{ needs.build.outputs.image }}@${{ needs.build.outputs.digest }}" \
            --referrers

          echo "=== Cosign verify ==="
          cosign verify \
            --certificate-identity-regexp="https://github.com/${{ github.repository }}/" \
            --certificate-oidc-issuer="https://token.actions.githubusercontent.com" \
            "${{ needs.build.outputs.image }}@${{ needs.build.outputs.digest }}"
