# SLSA Build L3 Provenance 生成示例（GitHub Actions）
# 对齐：SLSA v1.2 Build Track、Sigstore/Cosign、GitHub Actions SLSA generator
# 使用：将本文件复制到 .github/workflows/slsa-provenance.yml

name: SLSA Build L3 Provenance

on:
  push:
    branches: [main, release/*]
    tags: ["v*"]
  workflow_dispatch:

permissions:
  id-token: write   # 用于 Sigstore  Fulcio 身份令牌
  contents: read
  actions: read

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  build:
    runs-on: ubuntu-latest
    outputs:
      digest: ${{ steps.build.outputs.digest }}
      image: ${{ steps.image.outputs.image }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0   # SLSA Source Track 需要完整历史

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=ref,event=branch
            type=semver,pattern={{version}}
            type=sha

      - name: Build and push image
        id: build
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          provenance: true          # 生成 OCI v1.1 provenance attestation
          sbom: true                # 生成 SBOM attestation
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Output image reference
        id: image
        run: |
          echo "image=${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}" >> "$GITHUB_OUTPUT"

  # ---------------------------------------------------------------------------
  # SLSA Build L3 Provenance (GitHub Actions SLSA generator)
  # ---------------------------------------------------------------------------
  provenance:
    needs: [build]
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read
      actions: read
    steps:
      - name: Generate SLSA provenance
        uses: slsa-framework/slsa-github-generator/.github/workflows/generator_container_slsa3.yml@v2.0.0
        with:
          image: ${{ needs.build.outputs.image }}
          digest: ${{ needs.build.outputs.digest }}
          registry-username: ${{ github.actor }}
          registry-password: ${{ secrets.GITHUB_TOKEN }}

  # ---------------------------------------------------------------------------
  # Cosign 签名（Sigstore keyless）
  # ---------------------------------------------------------------------------
  sign:
    needs: [build]
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read
    steps:
      - name: Install Cosign
        uses: sigstore/cosign-installer@v3

      - name: Sign image with Cosign (keyless)
        run: |
          cosign sign --yes \
            "${{ needs.build.outputs.image }}@${{ needs.build.outputs.digest }}"

      - name: Verify signature
        run: |
          cosign verify \
            --certificate-identity-regexp="https://github.com/${{ github.repository }}/" \
            --certificate-oidc-issuer="https://token.actions.githubusercontent.com" \
            "${{ needs.build.outputs.image }}@${{ needs.build.outputs.digest }}"

  # ---------------------------------------------------------------------------
  # SBOM 验证与策略检查
  # ---------------------------------------------------------------------------
  verify:
    needs: [build, provenance, sign]
    runs-on: ubuntu-latest
    steps:
      - name: Install Syft + Grype
        run: |
          curl -sSfL https://raw.githubusercontent.com/anchore/syft/main/install.sh | sh -s -- -b /usr/local/bin
          curl -sSfL https://raw.githubusercontent.com/anchore/grype/main/install.sh | sh -s -- -b /usr/local/bin

      - name: Download SBOM from registry
        run: |
          # Docker BuildKit 生成的 SBOM 已作为 OCI v1.1 reference type 附加
          # 此处演示使用 Syft 重新生成以进行交叉验证
          syft "${{ needs.build.outputs.image }}@${{ needs.build.outputs.digest }}" \
            -o spdx-json=/tmp/sbom.spdx.json \
            -o cyclonedx-json=/tmp/sbom.cdx.json

      - name: Vulnerability scan
        run: |
          grype sbom:/tmp/sbom.cdx.json --fail-on high

      - name: Upload SBOM artifacts
        uses: actions/upload-artifact@v4
        with:
          name: sboms
          path: |
            /tmp/sbom.spdx.json
            /tmp/sbom.cdx.json
