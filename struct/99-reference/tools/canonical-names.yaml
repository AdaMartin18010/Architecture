      - "ArchiMate 4"
      - "ArchiMate 4.0 Specification"
      - "ArchiMate 3.2"
      - "ArchiMate 3.2 Specification"
      - "ArchiMate 4.2"
      - "ArchiMate 4.2 Specification"
    invalid_versions:
      - "4.1"
      - "4.2"
      - "4.3"
      - "5.0"

  - canonical: "ISO/IEC/IEEE 15288:2023"
    aliases:
