# 标准与协议名称 canonical 字典
# 用于 knowledge-extractor.py 将项目中的变体写法归一到单一权威实体。
# canonical: KG 中使用的权威名称（也是实体 label）
# aliases: 项目中常见的等价/错误写法，出现即归一到 canonical
# invalid_versions: 已知的错误版本号；若 extractor 通过前缀匹配到这些版本，也归一到 canonical 并报警告

standards:
  - canonical: "ISO/IEC 25010:2023"
    aliases:
      - "ISO/IEC 25010"
      - "ISO/IEC 25010:2024"
      - "ISO 25010:2023"
      - "ISO 25010:2024"
      - "IEC 25010:2023"
      - "IEC 25010:2024"
      - "ISO 25010"
      - "IEC 25010"
    invalid_versions:
      - "2024"
      - "2025"

  - canonical: "ISO/IEC/IEEE 42010:2022"
    aliases:
      - "ISO/IEC/IEEE 42010"
      - "ISO 42010:2022"
      - "ISO/IEC 42010:2022"
      - "ISO 42010"
      - "IEC/IEEE 42010:2022"
      - "IEC/IEEE 42010"

  - canonical: "ArchiMate 4.0"
