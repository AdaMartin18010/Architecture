      - "IEC 62443-4-2"
      - "IEC 62443-4-2:2025"
    invalid_versions:
      - "2025"

  - canonical: "NIST SSDF 1.2"
    aliases:
      - "SSDF 1.2"
      - "NIST SP 800-218 Rev. 1"
      - "NIST SP 800-218 Rev.1"
